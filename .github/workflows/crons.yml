name: App Crons

on:
  schedule:
    # Channel Syncs - Daily at 09:00 UTC (6:00 AM ART)
    - cron: '0 9 * * *'
    # Fill Gaps - Daily at 09:30 UTC (after syncs finish)
    - cron: '30 9 * * *'
    # Account Health - Every 6 hours
    - cron: '0 */6 * * *'
    # Semáforo - Daily at 10:10 UTC (after data-sync)
    - cron: '10 10 * * *'
    # Daily Briefing - Daily at 10:15 UTC (after data-sync + semáforo)
    - cron: '15 10 * * *'
    # Weekly Alerts - Monday at 10:30 UTC
    - cron: '30 10 * * 1'
  workflow_dispatch:
    inputs:
      job:
        description: 'Which cron to run'
        required: false
        default: 'all'
        type: choice
        options:
          - all
          - sync-channels
          - fill-gaps
          - account-health
          - semaforo
          - daily-briefing
          - weekly-alerts

env:
  APP_URL: https://ai-analyzer-dusky-phi.vercel.app

jobs:
  sync-channels:
    if: github.event.schedule == '0 9 * * *' || github.event_name == 'workflow_dispatch' && (github.event.inputs.job == 'all' || github.event.inputs.job == 'sync-channels')
    runs-on: ubuntu-latest
    steps:
      - name: Sync Meta Ads
        run: |
          echo "📊 Triggering Meta Ads sync..."
          curl -sS -f "${{ env.APP_URL }}/api/cron/sync-meta" \
            -H "Authorization: Bearer ${{ secrets.CRON_SECRET }}" \
            || echo "⚠️ Meta sync failed (will retry via fill-gaps)"

      - name: Sync Google Ads
        run: |
          echo "📊 Triggering Google Ads sync..."
          curl -sS -f "${{ env.APP_URL }}/api/cron/sync-google" \
            -H "Authorization: Bearer ${{ secrets.CRON_SECRET }}" \
            || echo "⚠️ Google sync failed (will retry via fill-gaps)"

      - name: Sync Ecommerce
        run: |
          echo "🛒 Triggering Ecommerce sync..."
          curl -sS -f "${{ env.APP_URL }}/api/cron/sync-ecommerce" \
            -H "Authorization: Bearer ${{ secrets.CRON_SECRET }}" \
            || echo "⚠️ Ecommerce sync failed (will retry via fill-gaps)"

      - name: Sync Email
        run: |
          echo "📧 Triggering Email sync..."
          curl -sS -f "${{ env.APP_URL }}/api/cron/sync-email" \
            -H "Authorization: Bearer ${{ secrets.CRON_SECRET }}" \
            || echo "⚠️ Email sync failed (will retry via fill-gaps)"

      - name: Sync GA4
        run: |
          echo "📈 Triggering GA4 sync..."
          curl -sS -f "${{ env.APP_URL }}/api/cron/sync-ga4" \
            -H "Authorization: Bearer ${{ secrets.CRON_SECRET }}" \
            || echo "⚠️ GA4 sync failed (will retry via fill-gaps)"

  fill-gaps:
    if: github.event.schedule == '30 9 * * *' || github.event_name == 'workflow_dispatch' && (github.event.inputs.job == 'all' || github.event.inputs.job == 'fill-gaps')
    runs-on: ubuntu-latest
    steps:
      - name: Fill Gaps
        run: |
          echo "🔄 Triggering Fill Gaps..."
          curl -sS -f "${{ env.APP_URL }}/api/cron/fill-gaps" \
            -H "Authorization: Bearer ${{ secrets.CRON_SECRET }}"

      - name: Process Backfill Queue
        run: |
          echo "📦 Processing backfill queue..."
          curl -sS -f "${{ env.APP_URL }}/api/cron/process-backfill-queue" \
            -H "Authorization: Bearer ${{ secrets.CRON_SECRET }}" \
            || echo "⚠️ Backfill queue processing failed"

  account-health:
    if: github.event.schedule == '0 */6 * * *' || github.event_name == 'workflow_dispatch' && (github.event.inputs.job == 'all' || github.event.inputs.job == 'account-health')
    runs-on: ubuntu-latest
    steps:
      - name: Account Health Check
        run: |
          echo "🏥 Triggering Account Health..."
          curl -sS -f "${{ env.APP_URL }}/api/cron/account-health" \
            -H "Authorization: Bearer ${{ secrets.CRON_SECRET }}"

  semaforo:
    if: github.event.schedule == '10 10 * * *' || github.event_name == 'workflow_dispatch' && (github.event.inputs.job == 'all' || github.event.inputs.job == 'semaforo')
    runs-on: ubuntu-latest
    steps:
      - name: Semáforo Computation
        run: |
          echo "🚦 Triggering Semáforo..."
          curl -sS -f "${{ env.APP_URL }}/api/cron/semaforo" \
            -H "Authorization: Bearer ${{ secrets.CRON_SECRET }}" \
            || echo "⚠️ Semáforo failed"

  daily-briefing:
    if: github.event.schedule == '15 10 * * *' || github.event_name == 'workflow_dispatch' && (github.event.inputs.job == 'all' || github.event.inputs.job == 'daily-briefing')
    runs-on: ubuntu-latest
    steps:
      - name: Daily Multi-Channel Briefing
        run: |
          echo "📊 Triggering Daily Briefing..."
          curl -sS -f "${{ env.APP_URL }}/api/cron/daily-briefing" \
            -H "Authorization: Bearer ${{ secrets.CRON_SECRET }}" \
            || echo "⚠️ Daily Briefing failed"

  weekly-alerts:
    if: github.event.schedule == '30 10 * * 1' || github.event_name == 'workflow_dispatch' && (github.event.inputs.job == 'all' || github.event.inputs.job == 'weekly-alerts')
    runs-on: ubuntu-latest
    steps:
      - name: Weekly Alert Digest
        run: |
          echo "📋 Triggering Weekly Alerts..."
          curl -sS -f "${{ env.APP_URL }}/api/cron/weekly-alerts" \
            -H "Authorization: Bearer ${{ secrets.CRON_SECRET }}" \
            || echo "⚠️ Weekly Alerts failed"
